<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESATIC - Gestion des absences</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; }
        .navbar-brand { font-weight: bold; }
        .card-header { background-color: #0f3b5f; color: white; }
        .btn-esatic { background-color: #0f3b5f; color: white; }
        .btn-esatic:hover { background-color: #0a2c48; color: white; }
        .nav-tabs .nav-link.active { background-color: #0f3b5f; color: white; border-color: #0f3b5f; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-header">
                <h3><i class="fas fa-calendar-check"></i> ESATIC - Plateforme de gestion des présences et absences</h3>
            </div>
            <div class="card-body">
                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'parametrage' %}active{% endif %}" href="{{ url_for('parametrage') }}">
                            <i class="fas fa-sliders-h"></i> Paramétrage
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'saisie' %}active{% endif %}" href="{{ url_for('saisie') }}">
                            <i class="fas fa-pen-alt"></i> Saisie
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'edition' %}active{% endif %}" href="{{ url_for('edition') }}">
                            <i class="fas fa-chart-line"></i> Édition
                        </a>
                    </li>
                </ul>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category != 'info' else 'secondary' }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endwith %}

                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
